name: Keep Servers serv00
on:
  schedule:
   - cron: '0 15 */8 * *'
  workflow_dispatch: 

jobs:
  keep_servers_alive:
    runs-on: ubuntu-latest
    env:
      ACCOUNTS: >
        [
        {"SSH_USER":"123456789", "SSH_PASS":"123456", "HOST":"sxxx.serv00.com"}
        ]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2

      - name: Install required packages
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass jq

      - name: Process each account
        run: |
           echo "*****************************************************"
           echo "*****************************************************"
           echo "Brother Yong Github Project: github.com/yonggekkk"
           echo "Brother Yong's Blogger Blog: ygkkk.blogspot.com"
           echo "Brother Yong YouTube Channel: www.youtube.com/@ygkkk"
           echo "vps server remote login once SSH script [Github]"
           echo "*****************************************************"
           echo "*****************************************************"
            count=0  
           for account in $(echo "${ACCOUNTS}" | jq -c '.[]'); do
              count=$((count+1))
              SSH_USER=$(echo $account | jq -r '.SSH_USER')
              SSH_PASS=$(echo $account | jq -r '.SSH_PASS')
              HOST=$(echo $account | jq -r '.HOST')
           if sshpass -p "$SSH_PASS" ssh -o StrictHostKeyChecking=no "$SSH_USER@$HOST" -q exit; then
            echo "🎉Congratulations! [✅$count] server (s) connected successfully!🚀 Server address: $HOST, account name: $SSH_USER" 
           else
            echo "===================================================="
            echo "💥Cup!❌ [$count] server connection failed!🚀 Server address: $HOST, account name: $SSH_USER"
            echo "The account name, password, server name ⚠️may be entered incorrectly, or the server is currently under maintenance"  
            echo "===================================================="
           fi
           sleep 10
            done
